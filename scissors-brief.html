Status: Draft (reviewed) | Version: 3.0 | Date: 2026-04-09 | Author: Product Team

# 1. Background & Context

Users frequently over-merge items past needed levels with no recovery path. This is the #1 frustration reported in merge-related support tickets. Scissors introduce a reverse-merge mechanic \u2014 drag scissors onto a merged item to split it into lower-level items.

Two variants create a natural monetization ladder:

| Variant | Output | Acquisition |
|---------|--------|-------------|
| Scissors (Regular) | 2x items, one level lower | Gameplay, store, events |
| Rainbow Scissors (Premium) | 3x items, one level lower | Store, events, premium rewards |

This is the first "item manipulation" booster in Merge Cruise. It extends the existing booster infrastructure with minimal incremental cost.

---

# 2. MIAMI Framework

## 2.1 Motivations

Primary: Eliminate the #1 user frustration \u2014 accidental over-merges with no recovery.
Secondary: Open a new monetization vector via a two-tier booster (regular vs. premium Rainbow).

Supporting:
- Reduce churn from frustrated users who over-merge
- Add strategic depth to board management
- Differentiate Merge Cruise from competitors (first-to-market reverse-merge)
- Foundation for future "item manipulation" features

## 2.2 Success Metrics

| Goal | Metric | Target | Timeframe |
|------|--------|--------|-----------|
| Reduce frustration | Support tickets re: merging | -30% | 8 weeks |
| Drive engagement | Scissors usage rate | >15% of DAU | 4 weeks |
| Revenue | Rainbow Scissors ARPDAU | +\$0.02 | 8 weeks |
| Game balance | Item economy inflation | <5% increase | Ongoing |

## 2.3 Illustration

User has a Level 5 Flower on the board but needs Level 4 Flowers for a board task. They drag Regular Scissors onto the L5 Flower \u2192 it splits into 2x L4 Flowers placed on adjacent tiles. Problem solved.

## 2.4 Key Risks

- Economy inflation: Rainbow Scissors create a net +2 items per use. Must control acquisition rates.
- Exploit loops: Rapid cut \u2192 merge \u2192 cut cycles. Mitigated via configurable rate limiting.
- Existing booster cannibalization: Monitor store conversion for other boosters post-launch.
- Board congestion: 3 items from Rainbow could crowd board. RC overflow handles this.

## 2.5 Integrations

- Board system (item placement, tile states, generators)
- Reward Center (overflow destination)
- Store / Purchase system (IAP for Rainbow)
- Booster framework (StoreItemType enum)
- FTUE system (tutorial on first encounter)
- Popup priority queue
- LiveOps config (A/B testing, segmentation)
- Analytics framework (BI events)
- UiLockManager (lock during cut animation)

## 2.6 Innovation

- First reverse-merge mechanic in the merge game genre
- Two-tier booster creates natural upsell path
- Foundation for future item manipulation features (precision cut, chain cutting)

# 6. Feature Mechanics

## 6.1 Item Definitions

ACTION REQUIRED: Integer item IDs must be assigned from the item catalog before implementation. Placeholder IDs below need confirmation from the content team.

| Property | Regular Scissors | Rainbow Scissors |
|----------|-----------------|------------------|
| Item ID | TBD (needs integer from catalog) | TBD (needs integer from catalog) |
| Item Type | Booster (StoreItemType.Scissors) | Booster (StoreItemType.ScissorsRainbow) |
| Output Count | 2 | 3 |
| Output Level | target_level - 1 | target_level - 1 |
| Output Chain | Same as target | Same as target |
| Consumed on Use | Yes | Yes |
| Phase 2: Merge | 2x Regular \u2192 1x Rainbow | N/A (max tier) |

## 6.2 Target Validation

### Valid Targets
- Merge chain items at Level \u2265 2
- Recipe output items at Level \u2265 2 (outputs same chain, NOT original ingredients)
- Max-level items (always valid if level \u2265 2)

### Invalid Targets

| Category | Reason | Error Message |
|----------|--------|---------------|
| Level 1 items | No lower level exists | "Cannot cut \u2014 already at minimum level" |
| Generators | Not merge chain items | "Cannot cut generators" |
| Other boosters | Utility items | "Cannot cut boosters" |
| Locked/Chained/Bubbled/Fogged | Must resolve state first | "Unlock/Break/Pop/Reveal first" |
| Currency, Energy, Stickers | Not mergeable items | "Cannot cut this item" |
| Items mid-animation | Temporarily locked | "Wait for item to settle" |
| Milestone tokens (Flowers/Recipes) | Special consume-on-tap behavior | "Cannot cut event tokens" |

## 6.3 Output Placement Algorithm

1. Target tile \u2014 always available after item removal
2. Adjacent tiles \u2014 up/down/left/right, then diagonals (BFS spiral)
3. Expanding spiral \u2014 BFS outward from target
4. Reward Center \u2014 overflow destination (tap-to-collect, fly animation)
5. Block action \u2014 if Reward Center also full, show toast: "No space \u2014 clear board or Reward Center first"

## 6.4 Board Space Scenarios

| Scenario | Regular (2 items) | Rainbow (3 items) |
|----------|-------------------|-------------------|
| Target + 1+ adjacent free | All on board | All on board (if 2+ adjacent) |
| Target tile only | 1 board, 1 RC | 1 board, 2 RC |
| No tiles free | Both to RC | All 3 to RC |
| RC also full | Action blocked | Action blocked |

# 7. Board Integration

## 7.1 Board Grid
Scissors operates on the standard 7x9 board grid. No grid modifications needed.

## 7.2 Board Modes
Scissors behavior is identical across all 3 board modes. Mode-dependent differences (GeneratorTapCost, DropPerRecharge) do not affect cut mechanics.

Phase 2 Note: If scissors drop from generators, the drop rate should be mode-configurable via DropPerRecharge settings.

## 7.3 Tile States
- Normal tiles: Valid for output placement
- SemiLocked tiles: Cannot place output here; skip in BFS
- Locked tiles: Cannot place output here; skip in BFS
- Items in locked/semi-locked states are invalid cut targets

## 7.4 Board Full Handling (Rule B6)
If the board has fewer empty tiles than output count:
- Place as many as possible on board
- Overflow items sent to Reward Center with fly animation
- If RC also full \u2192 block action entirely, scissors return to inventory
- Track free_tiles on all cut analytics events

## 7.5 Board Task Interaction
Edge case: If a board task requires a Level 5 item and the user cuts it to 2x Level 4, the task can no longer be completed with those items. This is intentional \u2014 scissors are a strategic choice with consequences. The invalid target system does NOT prevent cutting task-required items.

# 10. State Machine

States: IDLE \u2192 DRAGGING \u2192 VALIDATING \u2192 EXECUTING \u2192 PLACING \u2192 COMPLETED
Alternative paths: VALIDATING \u2192 REJECTED \u2192 IDLE, PLACING \u2192 BLOCKED \u2192 IDLE

User picks up scissors \u2192 DRAGGING
Drop on empty space (cancel) \u2192 IDLE
Drop on target \u2192 VALIDATING
Valid target \u2192 EXECUTING
Invalid target \u2192 REJECTED \u2192 IDLE (return scissors to inventory)
Cut animation complete \u2192 PLACING
Items placed \u2192 COMPLETED \u2192 IDLE
No space (board + RC full) \u2192 BLOCKED \u2192 IDLE (revert cut, return scissors)

### State Guarantees (Rules SM1-SM4)
- No skipped states: Every transition is sequential and deterministic
- Safe interruption: If a LiveOps event timer expires mid-cut, finish the current cut THEN process the event end
- No desync: Cut operation is atomic \u2014 server-validated, rollback on failure
- Idempotent: Double-tap prevention via 100ms debounce
- No undo: Cut is permanent. Scissors consumed = decision has weight.

## 11.1 Scissors Appear on Board

Trigger: User acquires scissors (store purchase, event reward, milestone reward, gift)

What happens:
- Scissors item spawns on the board using standard BFS spiral placement from a reference point
- If board is full \u2192 scissors go to Reward Center
- Scissors are a board item \u2014 they occupy a tile like any other item
- Visual: scissors icon with "x2" badge (regular) or "x3" gold badge + rainbow glow (premium)

Analytics: rewards_scissors or rewards_store (with package_type: "scissors")

## 11.2 FTUE (First Encounter)

Trigger: First time scissors appear on the user's board AND ftue_scissors_completed = false
Preconditions: Board is visible, no other FTUE active, no popup queue conflict
Flow: See Section 13 (FTUE) for full 6-step tutorial
Exit: Sets ftue_scissors_completed = true. User returns to normal board state.
Analytics: impression_ftue_scissors_step_N + click_ftue_scissors_step_N per step

## 11.3 User Drags Scissors

Trigger: User taps and holds scissors item on the board

What the user sees:
- Scissors lift with pop animation (scale 1.0 \u2192 1.1)
- Audio: metallic clink
- Board enters "targeting mode"

Target highlighting (real-time as user drags):

| Hover over | Visual | Audio |
|-----------|--------|-------|
| Valid target (L2+ merge chain item) | Green pulsing glow + tooltip: "Cut L5 \u2192 2x L4" | Soft chime |
| Invalid target (L1, generator, booster, etc.) | Red ring + shake + error message | Soft thud |
| Empty tile | Tile highlights (neutral) | None |
| Off-board area | Scissors dim slightly | None |

UI Lock: Board items cannot be merged/generated while scissors are being dragged. UiLockManager reason: "scissors_dragging"

## 11.4 Drop on Valid Target \u2192 Confirmation Popup

Trigger: User releases scissors over a valid target item (L2+ merge chain)
Preconditions: Target passed validation (Section 6.2), board not in animation state

Confirmation Popup appears:

| Element | Content |
|---------|---------|
| Icon | Scissors (large, centered) |
| Title | "Are you sure?" |
| Preview | Visual: [L5 item] \u2192 [2x L4 items] (or 3x for Rainbow) |
| Description | "Cut 1x L5 Flower into 2x L4 Flowers" |
| Warning | "This action cannot be undone" (coral/red text) |
| Confirm button | "Cut it!" (blue, primary) |
| Cancel button | "Cancel" (gray, secondary) |
| Footer | "You have N [type] Scissors remaining" (subtle gray) |

IF user taps "Cut it!": Proceed to Section 11.5 (Execute Cut)
IF user taps "Cancel": Scissors return to their original tile. No scissors consumed. Back to IDLE.

Analytics: impression_scissors_confirmation (click_id), then click_scissors_confirm or click_scissors_cancel

## 11.5 Cut Execution

Trigger: User confirmed cut in Section 11.4

System operations (atomic):
1. Consume 1x scissors from user inventory
2. Remove target item from board
3. Generate output items (2x for regular, 3x for rainbow) at target_level - 1, same chain
4. Server validates operation

Animation sequence (800ms total):
- 0ms: Scissors snap to target center, target freezes
- 100ms: Scissors "close" animation, diagonal slash across target, micro-shake
- 300ms: Target dissolves with particle burst, output items emerge from center
- 600ms: Items animate to final positions (board tiles: slide + pop-in; RC: arc trajectory)
- 800ms: Items settle with bounce + sparkle. UI updates.

UI Lock: All board interaction locked during animation. Reason: "scissors_cut_animation"

Analytics: click_scissors_cut with full params (scissors_type, target_item_id, target_item_level, output_count, items_on_board, items_to_rc, free_tiles)

IF server validation fails: Atomic rollback, scissors returned, toast: "Something went wrong"

## 11.6 Output Placement

Trigger: Cut animation complete (800ms)
Placement algorithm: See Section 6.3 (BFS spiral)

| Scenario | Behavior | User sees |
|----------|----------|-----------|
| Enough empty tiles | All items placed on board | Items pop into adjacent tiles with sparkle |
| Some tiles, not enough | Partial board + overflow to RC | Some items on board, rest arc to Reward Center with "Items sent to Reward Center" toast |
| No tiles AND RC full | Action blocked, cut reverted | Scissors return, toast: "No space \u2014 clear board or Reward Center first" |

## 11.7 Completion

Trigger: All output items placed (board or RC)

What happens:
- Scissors count in toolbar updates (e.g., x3 \u2192 x2)
- Board task progress re-evaluates (if output items match a task requirement, progress updates)
- Brief success banner: "Cut complete!" (fades after 2s)
- Board returns to IDLE state
- UiLockManager releases all scissors locks

## 11.8 Alternative Flows

Drop on empty tile: Scissors move to that tile (standard board item drag behavior). No cut, no scissors consumed.
Drop on invalid target: Swap animation (scissors and target exchange positions) OR scissors return to original tile + red ring + shake + error message. No scissors consumed.
Drop off-board: Cancel. Scissors return to original tile with snap-back animation.

Analytics: impression_scissors_invalid_target with reason param

# 21. Edge Cases & Error Handling

## 21.1 Timing

| Scenario | Behavior |
|----------|----------|
| Target merges during drag | Cancel, scissors return |
| Target collected by task during drag | Cancel, scissors return |
| LiveOps event ends mid-cut | Finish current cut, then process event end (Rule SM2) |
| Two scissors dragged simultaneously | Second blocked until first completes |
| Rapid successive cuts | 100ms debounce |

## 21.2 Network & State

| Scenario | Behavior |
|----------|----------|
| Disconnect mid-cut | Server rollback to last committed state |
| App backgrounded mid-animation | Complete on resume |
| Crash during execution | Atomic rollback |
| Offline cut attempt | Execute locally, sync on reconnect with server validation |

## 21.3 Economy

| Risk | Mitigation |
|------|-----------|
| Item inflation from Rainbow (+2 net) | Control Rainbow acquisition rate per segment |
| Cut \u2192 merge \u2192 cut exploit loops | Configurable daily_limit + rate limiting |
| Scissors farming | Configurable drop rates, A/B tested |

## 21.4 Undo Policy
No undo. Cut is permanent, scissors consumed. Decision has weight. Consistent with game design philosophy.

let messages=[];
let isTyping=false;

function askExample(btn){document.getElementById('input').value=btn.textContent;send();}

function fmt(text){
  text=text.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  // Parse markdown tables before other formatting
  text=text.replace(/((?:^\|.+\|$\n?)+)/gm, function(tableBlock){
    const rows=tableBlock.trim().split('\n').filter(r=>r.trim());
    if(rows.length<2) return tableBlock;
    const isSep=r=>/^\|[\s\-:|]+\|$/.test(r.trim());
    const dataRows=rows.filter(r=>!isSep(r));
    if(dataRows.length===0) return tableBlock;
    let html='<table style="width:100%;border-collapse:collapse;margin:8px 0;font-size:12.5px">';
    dataRows.forEach((row,i)=>{
      const cells=row.split('|').filter((c,j,a)=>j>0&&j<a.length);
      const tag=i===0?'th':'td';
      const bg=i===0?'background:#f5f5f0;font-weight:600;':'';
      html+='<tr>';
      cells.forEach(c=>{
        html+='<'+tag+' style="padding:6px 10px;border:1px solid #e8e8e4;'+bg+'">'+c.trim()+'</'+tag+'>';
      });
      html+='</tr>';
    });
    html+='</table>';
    return html;
  });
  text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  text=text.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  text=text.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  text=text.replace(/^- (.+)$/gm,'<li>$1</li>');
  text=text.replace(/(<li>[\s\S]*?<\/li>)/g,function(m){return '<ul>'+m+'</ul>';});
  text=text.replace(/<\/ul>\s*<ul>/g,'');
  text=text.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  text=text.replace(/\n\n/g,'</p><p>');
  text='<p>'+text+'</p>';
  text=text.replace(/<p><\/p>/g,'');
  text=text.replace(/<p>(<h3>|<ul>|<ol>|<pre>|<table)/g,'$1');
  text=text.replace(/(<\/h3>|<\/ul>|<\/ol>|<\/pre>|<\/table>)<\/p>/g,'$1');
  return text;
}

function addMsg(role,text){
  const chat=document.getElementById('chat');
  const g=document.createElement('div');
  g.className='msg-group '+(role==='user'?'user':'ai');
  const a=document.createElement('div');
  a.className='msg-avatar';
  if(role==='user'){a.textContent='\u{1F464}';}
  else{a.textContent='\u2728';a.style.cssText='background:linear-gradient(135deg,#1a1a2e,#3d3d7e);color:white;box-shadow:0 1px 2px rgba(0,0,0,0.04)';}
  const c=document.createElement('div');
  c.className='msg-content';
  c.innerHTML=role==='user'?text.replace(/</g,'&lt;').replace(/>/g,'&gt;'):fmt(text);
  g.appendChild(a);g.appendChild(c);chat.appendChild(g);
  requestAnimationFrame(()=>{
    if(role==='ai'){
      g.scrollIntoView({behavior:'smooth',block:'start'});
    } else {
      chat.scrollTop=chat.scrollHeight;
    }
  });
  return g;
}

function showTyping(){
  const chat=document.getElementById('chat');
  const ind=document.createElement('div');
  ind.className='typing-indicator';ind.id='typing';
  const a=document.createElement('div');
  a.className='msg-avatar';
  a.style.cssText='background:linear-gradient(135deg,#1a1a2e,#3d3d7e);color:white;box-shadow:0 1px 2px rgba(0,0,0,0.04)';
  a.textContent='\u2728';
  const d=document.createElement('div');
  d.className='typing-dots';
  d.innerHTML='<span></span><span></span><span></span>';
  ind.appendChild(a);ind.appendChild(d);chat.appendChild(ind);
  chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){const el=document.getElementById('typing');if(el)el.remove();}

async function send(){
  if(isTyping)return;
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';input.style.height='40px';
  const w=document.getElementById('welcome');if(w)w.style.display='none';
  const ex=document.getElementById('examples-section');if(ex)ex.style.display='none';
  addMsg('user',text);
  messages.push({role:'user',content:text});
  const btn=document.getElementById('send-btn');
  btn.disabled=true;isTyping=true;showTyping();
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':_d(_e,_k),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2048,system:SYSTEM,messages:messages.slice(-10)})
    });
    hideTyping();
    if(!resp.ok){const err=await resp.json();addMsg('ai','Sorry, I encountered an error: '+(err.error?.message||'Request failed.'));messages.pop();}
    else{const data=await resp.json();const answer=data.content[0].text;addMsg('ai',answer);messages.push({role:'assistant',content:answer});}
  }catch(e){hideTyping();addMsg('ai','Connection error. Please check your internet and try again.');messages.pop();}
  btn.disabled=false;isTyping=false;input.focus();
}
