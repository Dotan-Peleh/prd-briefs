# 1. Background & Context

Merge-2 competitors (Merge Dragons, Gossip Harbor, Merge Mansion) ship season passes that drive sustained engagement and predictable revenue. Merge Cruise has no equivalent.

Cruise Pass \u2014 a 28-day seasonal progression system:
- 30 tiers with two parallel reward tracks (Free + Premium)
- Progress fills automatically from normal gameplay (merges, generations, tasks)
- No new currency \u2014 user sees only a progress bar filling
- Two paid tiers: Premium Pass (\$4.99) and Super Pass (\$7.99) with +50% progress boost
- Retroactive unlock \u2014 buy mid-season, instantly receive all missed premium rewards
- Endless rewards after Tier 30 for Super Pass holders
- Daily quests provide structured progression alongside passive action-based progress

---

# 2. MIAMI Framework

### Motivations
- Primary: Predictable recurring revenue via seasonal pass purchases
- Secondary: Daily engagement \u2014 users MUST play regularly to maximize pass value
- Reward loyal users, increase LTV of mid-spenders, framework for themed seasonal content

### Success Metrics

| Metric | Target | When |
|--------|--------|------|
| Premium Pass purchase rate | >8% of MAU | Season 2 |
| D7 retention lift (pass holders) | +5pp | Season 1 |
| DAU/MAU (pass holders) | >0.45 | Season 1 |
| Pass holders reaching Tier 30 | >40% | Season 1 |

### Key Risks
- Cannibalization: May reduce other IAP. Monitor store revenue independently.
- Completion anxiety: Pace calibrated for ~45min/day users reaching Tier 30 by Day 25.
- Pay-to-win perception: Premium rewards = boosters only, NO power advantages.

### Integrations
Board (progress from actions), Scapes (progress from tasks), Store/Purchase (Premium IAP), Reward Center (tier rewards), Popup queue, Badge system, FTUE, Analytics, impression_scapes

---

# 3. Scope

MVP: 30-tier dual track, action-based progression, Premium Pass IAP, season popup, tier unlock animation, lobby badge, FTUE, analytics, remote config, kill switch

Later: Daily/weekly challenges, streak multiplier, themed seasons, progress boost IAP, seasonal decorations, social leaderboard

# 4. Feature Mechanics

## 4.1 Progress

Progress fills automatically from normal gameplay. No new currency. No visible numbers. User sees only a bar moving.

| Action | Progress |
|--------|----------|
| Merge | +1 |
| Generation | +1 |
| Board task completion | +5 |
| Scape task completion | +10 |
| Chapter completion | +50 |
| Daily login (first board entry) | +10 |

Progress values are configurable per segment. Pacing target: ~45min/day user reaches Tier 30 by Day 25.

Super Pass users get +50% on all progress values above (e.g., merge = +1.5 rounded, board task = +7.5 rounded). This means Super Pass holders can reach Tier 30 ~5 days earlier than standard users, leaving time for endless bonus rewards.

## 4.2 Tiers

30 tiers. Progress required increases gradually:

| Tiers | Actions/Tier | Cumulative | Rewards |
|-------|-------------|------------|---------|
| 1-5 | 100 | 500 | Credits, small boosters |
| 6-15 | 150 | 2,000 | Boosters, Album Packs |
| 16-25 | 200 | 4,000 | Rare chests, large Credit bundles |
| 26-30 | 250 | 5,250 | Exclusive seasonal items |

## 4.3 Reward Tracks

Free Track (all users): Credits, standard boosters, Common Album Packs

Premium Track (\$4.99 Premium Pass): Large Credit bundles (3-5x free), Rare/Epic Album Packs, Premium boosters (Scissors, Rainbow Scissors), Tier 30 exclusive seasonal decoration

Super Pass (\$7.99 = Premium + perks): Everything in Premium Track PLUS:
- +50% progress boost on all actions (merge = +1.5 instead of +1)
- Endless rewards after Tier 30 \u2014 continue earning bonus chests for every 250 progress beyond final tier
- Immediate bonus on purchase: 1 Rare Album Pack + 2,000 Credits delivered instantly

Retroactive Unlock: Buy Premium or Super Pass mid-season at Tier 18 \u2192 instantly receive all 18 missed premium rewards.

## 4.4 Daily Quests

In addition to passive progress from gameplay actions, users receive 3 daily quests each day that grant bonus progress when completed.

| Quest Type | Example | Bonus Progress |
|-----------|---------|----------------|
| Complete orders | "Complete 5 board tasks" | +30 |
| Spend credits | "Spend 500 Credits on generators" | +25 |
| Merge items | "Merge 20 items" | +20 |

Quest escalation: Difficulty increases gradually over the season:
- Days 1-7: Easy targets (3 tasks, 5 merges, 200 credits)
- Days 8-21: Medium targets (5 tasks, 10 merges, 500 credits)
- Days 22-28: Hard targets (8 tasks, 20 merges, 1000 credits)

Bonus quest: After completing all 3 daily quests, an endless repeatable quest appears: "Use 100 Credits" \u2192 +10 progress. Allows hardcore users to grind extra progress.

Quest targets and bonus progress are configurable per segment.

## 4.5 Endless Rewards (Super Pass only)

Super Pass holders who reach Tier 30 continue earning rewards:
- Every 250 progress beyond Tier 30 unlocks a bonus chest (random: Credits, Album Pack, or booster)
- Progress bar reappears labeled "Bonus" with infinite repeating fill
- Ensures no gameplay goes unrewarded for the rest of the season
- Free and Premium Pass users do NOT get endless rewards \u2014 incentive to upgrade

## 4.6 Season End

- 24h grace period to claim unclaimed rewards
- After grace: unclaimed rewards auto-delivered (currencies to balance, packs to album, items to Reward Center)
- Progress resets. Premium Pass resets. Must repurchase next season.

# 5. User Flow

## Flow Overview

1. A new season is configured and goes live.
2. The user enters the game and is eligible (chapter >= 8, season active, feature enabled).
3. The Season Start popup appears showing the pass with 30 tiers and two tracks.
4. If this is the user's first ever season, the FTUE tutorial plays (4 steps).
5. The user plays normally on the board. A progress bar fills from merges, generations, and task completions.
6. Each day, 3 daily quests appear (e.g., "Complete 5 tasks", "Spend 500 Credits") granting bonus progress when completed. An endless repeatable quest appears after all 3 are done.
7. When the progress bar fills, a tier unlocks and the free reward is delivered to the designated place \u2014 Balance / RC / Album pack.
8. If the user purchased the Premium or Super Pass, the premium reward is also delivered alongside the free reward.
9. The user can purchase the Premium Pass (\$4.99) or Super Pass (\$7.99, includes +50% progress boost + endless rewards after Tier 30) at any point. All previously earned premium rewards are delivered instantly (retroactive unlock).
10. Super Pass users who reach Tier 30 continue earning bonus chests for every 250 progress.
11. When the season ends, a summary popup appears. A 24h grace period allows claiming unclaimed rewards.
12. After the grace period, unclaimed rewards auto-collect. Progress and premium status reset.

### Season Start & Eligibility

1. The user enters the game and the Cruise Pass is configured for them, meaning:
   - A season is currently active (within start/end date range)
   - The user is at or above the configured minimum chapter (default: chapter 8)
   - The feature is enabled for the user's segment
2. When the user enters the lobby:
   - The Cruise Pass lobby badge appears with the season theme icon, a timer counting down the days remaining, and the user's current tier number.
   - If the user has purchased the Premium Pass, the badge has a gold border.
3. The Season Start popup is displayed after all higher-priority popups. It contains:
   - Season theme art and title (e.g., "Season 1: Summer Cruise")
   - A scrollable preview of the first 5 tiers with free and premium rewards
   - A "Start Playing" button (primary, blue)
   - A "Get Premium \u2014 \$4.99" button (gold) and "Super Pass \u2014 \$7.99" button (gold + sparkle, showing "+50% Boost")
   - Season timer showing days remaining

### FTUE (first season only)

1. If this is the user's first ever Cruise Pass season (ftue_cruise_pass_completed = false):
   - After dismissing the Season Start popup, a 4-step tutorial plays:
     1. Highlight the lobby badge \u2192 "This is your Cruise Pass! Earn rewards all season."
     2. Highlight the progress bar on the board \u2192 "Play normally \u2014 merges and tasks fill the bar."
     3. Open the Cruise Pass popup showing free vs premium tracks \u2192 "Free rewards for everyone. Premium rewards for pass holders."
     4. Dismiss \u2192 "Start playing!"
   - Interaction is locked during all FTUE steps. UiLockManager reason: "cruise_pass_ftue"
   - After completion, ftue_cruise_pass_completed is set to true. The FTUE will not show again.

### Progress During Gameplay

1. The user plays normally on the board. A thin progress bar appears above the booster toolbar showing:
   - The current tier number
   - A visual fill indicating progress toward the next tier (NO numeric counter \u2014 just a bar)
   - Tapping the bar opens the Cruise Pass popup
2. As the user plays, the bar fills automatically:
   - Each merge fills +1 progress
   - Each generator tap fills +1 progress
   - Each board task completion fills +5 progress
   - Each scape task completion fills +10 progress
   - Each chapter completion fills +50 progress
   - First board entry of the day fills +10 progress (daily login)
3. When the bar is close to the next tier (<20% remaining), it pulses gently to build anticipation.
4. Progress accrual is completely passive and non-blocking \u2014 gameplay is never interrupted.

### Tier Unlock

1. When the progress bar reaches the threshold for the next tier:
   - The bar fills completely with a burst animation
   - A "Tier [N] Unlocked!" banner slides in from the top and auto-dismisses after 2 seconds
   - The tier number increments and the bar resets for the next tier
   - The free track reward is delivered based on its type:
     - Credits/Cash \u2192 fly animation to the credit/cash balance meter
     - Album Packs \u2192 fly animation to the album icon
     - Items (boosters, chests, energy) \u2192 fly animation to the Reward Center
   - If the user has purchased the Premium Pass, the premium reward is also delivered alongside with a gold border and sparkle effect
   - If the user has NOT purchased the Premium Pass, the premium reward is shown as locked (gold padlock icon) in the Cruise Pass popup
2. If multiple tiers are unlocked in one session (e.g., after a long play session), the banners appear sequentially with a 1-second delay between each. Rewards are batch-delivered to the Reward Center.

### Premium / Super Pass Purchase

1. At any time during the season, the user can purchase a pass by:
   - Tapping "Get Premium" or "Super Pass" in the Season Start popup, OR
   - Tapping "Get Pass" in the Cruise Pass popup (opened from badge or progress bar)
2. When the user taps a purchase CTA:
   - A confirmation popup appears showing two options side by side:
     - Premium Pass \u2014 \$4.99: "30 extra rewards worth over \$30!" + retroactive note
     - Super Pass \u2014 \$7.99: Everything in Premium PLUS "+50% Progress Boost" + "Endless rewards after Tier 30" + immediate bonus (1 Rare Album Pack + 2K Credits)
     - If mid-season: "Instantly receive [N] premium rewards you've already earned!"
     - "Not now" button (gray)
   - If the user confirms either option, the native purchase flow starts.
   - If the purchase is successful:
     - All previously earned premium rewards (from Tier 1 to current tier) are delivered instantly in a cascade animation
     - From this point forward, every new tier unlock delivers both free and premium rewards
     - The lobby badge gets a gold border (Premium) or gold + sparkle border (Super)
     - If Super Pass: progress multiplier activates immediately (+50% on all future actions) and immediate bonus delivered
   - If the purchase fails, standard failure handling applies. No pass unlock.

### Daily Quests

1. Each day at the first board entry, 3 daily quests appear in a quest panel below the progress bar:
   - Each quest has a clear target (e.g., "Complete 5 board tasks", "Merge 20 items", "Spend 500 Credits")
   - Completing a quest grants bonus progress (+20 to +30 depending on difficulty)
   - Quests escalate over the season: easy in Days 1-7, medium in Days 8-21, hard in Days 22-28
2. After completing all 3 daily quests, an endless repeatable quest appears:
   - "Use 100 Credits" \u2192 +10 progress (repeatable unlimited times)
   - Allows hardcore users to grind extra progress beyond daily quests
3. Quests reset at midnight UTC each day. Uncompleted quests do not carry over.

### Cruise Pass Popup

1. The user can open the Cruise Pass popup at any time by:
   - Tapping the lobby badge in the scapes screen
   - Tapping the progress bar on the board
2. The popup shows:
   - A scrollable trail of all 30 tiers in two columns (Free | Premium)
   - The current tier is highlighted. Completed tiers show checkmarks.
   - Locked premium rewards show a gold padlock
   - A "Get Premium Pass" button at the bottom (if not purchased)

### Season End

1. When the season timer reaches 0:
   - If the user is currently playing, the session continues uninterrupted.
   - On the next lobby entry, a Season End popup appears: "Season Over! You reached Tier [N]!" with a summary of total rewards earned.
2. A 24-hour grace period begins:
   - The user can still open the Cruise Pass popup and claim any unclaimed rewards
   - No new progress is earned. The progress bar is hidden.
   - The lobby badge changes to "New Season Coming"
3. After the grace period expires:
   - All unclaimed rewards are auto-delivered \u2014 currencies to balance, packs to album, items to Reward Center
   - Progress resets to 0
   - Premium Pass status resets \u2014 must purchase again for the next season
   - The lobby badge either disappears or immediately shows the next season

### Tier 30 Completion

1. If the user reaches Tier 30 before the season ends:
   - A "Max Tier Reached!" celebration animation plays
   - For free/Premium users: The progress bar is hidden (no more tiers to unlock). The lobby badge shows a checkmark.
   - For Super Pass users: Progress bar reappears labeled "Bonus" \u2014 every 250 progress unlocks a bonus chest.
   - Normal gameplay continues.

# 10. Edge Cases

| Scenario | Behavior |
|----------|----------|
| Season ends during gameplay | Continue session. Popup on next lobby entry. Grace period starts. |
| Purchase fails mid-flow | Standard failure handling. No premium unlock. No retry lock. |
| Refund after purchase | Premium revoked. Already-claimed rewards NOT revoked (standard IAP policy). |
| Buy Premium at Tier 30 | All 30 premium rewards instantly in cascade animation. |
| Offline progress | Queued locally, synced on reconnect. Server reconciles. No double-counting. |
| Disconnect during tier unlock | Server already incremented. Client catches up on reconnect. |
| Disconnect during retroactive unlock | Atomic \u2014 all or none. Retry on reconnect. |
| User reaches chapter 8 mid-season | Pass activates immediately. Progress starts from 0. Season timer already running (user gets remaining days, not full 28). |
| Season config changes mid-season | Config locked at season start per user. Mid-season config changes apply only to new users entering the season. |
| User closes app during purchase flow | On relaunch, if purchase was approved but spin not completed, Cruise Pass popup opens before other popups and purchase completes. |
| User in grace period but no unclaimed rewards | Grace period ends silently. No popup. Badge transitions to next season. |
| Multiple LiveOps features + Cruise Pass active | All co-exist. Progress from merges/tasks counts toward Cruise Pass AND any active LiveOps event (Flowers tokens, Race points, etc.). |
| User has 0 scissors and premium tier gives scissors | Scissors delivered to board via standard BFS placement. If board full, to Reward Center. |
| Premium pass purchased from different device | Server-validated. Premium status syncs across devices immediately. |

let messages=[];

function askExample(btn){document.getElementById('input').value=btn.textContent;send();}

function fmt(text){
  text=text.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  // Parse markdown tables before other formatting
  text=text.replace(/((?:^\|.+\|$\n?)+)/gm, function(tableBlock){
    const rows=tableBlock.trim().split('\n').filter(r=>r.trim());
    if(rows.length<2) return tableBlock;
    const isSep=r=>/^\|[\s\-:|]+\|$/.test(r.trim());
    const dataRows=rows.filter(r=>!isSep(r));
    if(dataRows.length===0) return tableBlock;
    let html='<table style="width:100%;border-collapse:collapse;margin:8px 0;font-size:12.5px">';
    dataRows.forEach((row,i)=>{
      const cells=row.split('|').filter((c,j,a)=>j>0&&j<a.length);
      const tag=i===0?'th':'td';
      const bg=i===0?'background:#f5f5f0;font-weight:600;':'';
      html+='<tr>';
      cells.forEach(c=>{
        html+='<'+tag+' style="padding:6px 10px;border:1px solid #e8e8e4;'+bg+'">'+c.trim()+'</'+tag+'>';
      });
      html+='</tr>';
    });
    html+='</table>';
    return html;
  });
  text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  text=text.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  text=text.replace(/^## (.+)$/gm,'<h3>$1</h3>');
  text=text.replace(/^- (.+)$/gm,'<li>$1</li>');
  text=text.replace(/(<li>[\s\S]*?<\/li>)/g,function(m){return '<ul>'+m+'</ul>';});
  text=text.replace(/<\/ul>\s*<ul>/g,'');
  text=text.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');
  text=text.replace(/\n\n/g,'</p><p>');
  text='<p>'+text+'</p>';
  text=text.replace(/<p><\/p>/g,'');
  text=text.replace(/<p>(<h3>|<ul>|<ol>|<pre>|<table)/g,'$1');
  text=text.replace(/(<\/h3>|<\/ul>|<\/ol>|<\/pre>|<\/table>)<\/p>/g,'$1');
  return text;
}

function addMsg(role,text){
  const chat=document.getElementById('chat');
  const g=document.createElement('div');
  g.className='msg-group '+(role==='user'?'user':'ai');
  const a=document.createElement('div');
  a.className='msg-avatar';
  if(role==='user'){a.textContent='\u{1F464}';}
  else{a.textContent='\u2728';a.style.cssText='background:linear-gradient(135deg,#1a1a2e,#3d3d7e);color:white;box-shadow:0 1px 2px rgba(0,0,0,0.04)';}
  const c=document.createElement('div');
  c.className='msg-content';
  c.innerHTML=role==='user'?text.replace(/</g,'&lt;').replace(/>/g,'&gt;'):fmt(text);
  g.appendChild(a);g.appendChild(c);chat.appendChild(g);
  requestAnimationFrame(()=>{
    if(role==='ai'){
      g.scrollIntoView({behavior:'smooth',block:'start'});
    } else {
      chat.scrollTop=chat.scrollHeight;
    }
  });
  return g;
}

function showTyping(){
  const chat=document.getElementById('chat');
  const ind=document.createElement('div');
  ind.className='typing-indicator';ind.id='typing';
  const a=document.createElement('div');
  a.className='msg-avatar';
  a.style.cssText='background:linear-gradient(135deg,#1a1a2e,#3d3d7e);color:white;box-shadow:0 1px 2px rgba(0,0,0,0.04)';
  a.textContent='\u2728';
  const d=document.createElement('div');
  d.className='typing-dots';
  d.innerHTML='<span></span><span></span><span></span>';
  ind.appendChild(a);ind.appendChild(d);chat.appendChild(ind);
  chat.scrollTop=chat.scrollHeight;
}
function hideTyping(){const el=document.getElementById('typing');if(el)el.remove();}

async function send(){
  if(isTyping)return;
  const input=document.getElementById('input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';input.style.height='40px';
  const w=document.getElementById('welcome');if(w)w.style.display='none';
  const ex=document.getElementById('examples-section');if(ex)ex.style.display='none';
  addMsg('user',text);
  messages.push({role:'user',content:text});
  const btn=document.getElementById('send-btn');
  btn.disabled=true;isTyping=true;showTyping();
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':_d(_e,_k),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2048,system:SYSTEM,messages:messages.slice(-10)})
    });
    hideTyping();
    if(!resp.ok){const err=await resp.json();addMsg('ai','Sorry, I encountered an error: '+(err.error?.message||'Request failed.'));messages.pop();}
    else{const data=await resp.json();const answer=data.content[0].text;addMsg('ai',answer);messages.push({role:'assistant',content:answer});}
  }catch(e){hideTyping();addMsg('ai','Connection error. Please check your internet and try again.');messages.pop();}
  btn.disabled=false;isTyping=false;input.focus();
}
